    - obs space:
        name: ompstc_npp
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs/obs.20240224.t00z.ozone.ompstc_npp.nc
            missing file action: warn
        obsdataout:
          engine:
            type: H5File
            obsfile: ./output/diag.ozone.ompstc_npp_2024022400.nc
        io pool:
          max pool size: 1
        simulated variables:
        - ozoneTotal
      obs operator:
        name: ColumnRetrieval
        nlayers_retrieval: 1
        tracer variables:
        - mole_fraction_of_ozone_in_air
        isApriori: false
        isAveragingKernel: false
        totalNoVertice: true
        stretchVertices: topbottom
        model units coeff: 0.002241398632746
      obs pre filters:
      - filter: Perform Action
        filter variables:
        - name: ozoneTotal
        action:
          name: assign error
          error parameter: 6.0
      - filter: Bounds Check
        filter variables:
        - name: ozoneTotal
        minvalue: 0
        maxvalue: 1000
        action:
          name: reject
      - filter: RejectList
        filter variables:
        - name: ozoneTotal
        where:
        - variable:
            name: MetaData/totalOzoneQualityCode
          is_not_in: 0, 1
      - filter: RejectList
        filter variables:
        - name: ozoneTotal
        where:
        - variable:
            name: MetaData/bestOzoneAlgorithmFlag
          is_in: 3, 13
      - filter: RejectList
        filter variables:
        - name: ozoneTotal
        where:
        - variable:
            name: MetaData/sensorScanPosition
          is_in: 1, 2, 3, 4, 35
        - variable:
            name: MetaData/latitude
          minvalue: 50.0
      - filter: RejectList
        filter variables:
        - name: ozoneTotal
        where:
        - variable:
            name: MetaData/sensorScanPosition
          is_in: 1, 2, 3, 4, 35
        - variable:
            name: MetaData/latitude
          maxvalue: -50.0
      - filter: Gaussian Thinning
        horizontal_mesh: 150
        use_reduced_horizontal_grid: true
        distance_norm: geodesic
        action:
          name: reduce obs space
      obs post filters:
      - filter: Background Check
        filter variables:
        - name: ozoneTotal
        threshold: 10.0
        absolute threshold: 300.0
        action:
          name: reject
