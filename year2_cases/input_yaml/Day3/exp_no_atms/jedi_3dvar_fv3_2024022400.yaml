        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 60000
              - 55000
              errors:
              - 130
              - 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 183
        action:
          name: assign error
          error parameter: 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 120
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 80000
              - 75000
              - 70000
              - 65000
              - 60000
              - 55000
              errors:
              - 110
              - 120
              - 120
              - 120
              - 120
              - 100000000000.0
      - filter: Variable Assignment
        assignments:
        - name: InputObsError/stationPressure
          type: float
          source variable: ObsErrorData/stationPressure
      - filter: Variable Assignment
        assignments:
        - name: PreQC/stationPressure
          type: int
          source variable: QualityMarker/stationPressure
      - filter: Variable Assignment
        assignments:
        - name: PreUseFlag/stationPressure
          type: int
          source variable: PreQC/stationPressure
      - filter: Variable Assignment
        where:
        - variable:
            name: PreUseFlag/stationPressure
          is_in: 1-15
        assignments:
        - name: PreUseFlag/stationPressure
          value: 0
      - filter: Variable Assignment
        where:
        - variable:
            name: ObsType/stationPressure
          is_in: 183
        assignments:
        - name: PreUseFlag/stationPressure
          value: 100
      - filter: Variable Assignment
        where:
        - variable:
            name: ObsValue/stationPressure
          is_defined: null
        - variable:
            name: ObsValue/stationPressure
          maxvalue: 50000.0
        where operator: and
        assignments:
        - name: PreUseFlag/stationPressure
          value: 100
      - filter: Variable Assignment
        where:
        - variable:
            name: PreQC/stationPressure
          is_in: 9, 12, 15
        assignments:
        - name: PreUseFlag/stationPressure
          value: 100
      - filter: Variable Assignment
        where:
        - variable:
            name: PreQC/stationPressure
          is_in: 4-15
        assignments:
        - name: PreUseFlag/stationPressure
          value: 101
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: PreQC/stationPressure
          is_in: 3, 7
        action:
          name: inflate error
          inflation factor: 1.2
      obs post filters:
      - filter: Variable Assignment
        assignments:
        - name: ObsErrorFactorDuplicateCheck/stationPressure
          type: float
          function:
            name: ObsFunction/ObsErrorFactorDuplicateCheck
            options:
              use_air_pressure: false
              variable: stationPressure
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable:
            name: ObsType/stationPressure
          is_in: 180
        - variable:
            name: ObsSubType/stationPressure
          is_in: 0
        action:
          name: inflate error
          inflation factor: 0.7
      - filter: Variable Assignment
        assignments:
        - name: ObsErrorFactorSfcPressure/stationPressure
          type: float
          function:
            name: ObsFunction/ObsErrorFactorSfcPressure
            options:
              geovar_sfc_geomz: height_above_mean_sea_level_at_surface
              geovar_geomz: geopotential_height
              station_altitude: height
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        action:
          name: inflate error
          inflation variable:
            name: ObsErrorFactorSfcPressure/stationPressure
      - filter: Variable Assignment
        assignments:
        - name: DerivedMetaData/Innovation
          type: float
          function:
            name: ObsFunction/Arithmetic
            options:
              variables:
              - name: ObsValue/stationPressure
              - name: HofX/stationPressure
              coefs:
              - 1
              - -1
      - filter: Variable Assignment
        assignments:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure1
          type: float
          function:
            name: ObsFunction/ObsErrorBoundConventional
            options:
              obsvar: stationPressure
              obserr_bound_min: 100
              obserr_bound_max: 300
              obserr_bound_factor: 5.0
      - filter: Background Check
        filter variables:
        - name: stationPressure
        where:
        - variable: PreQC/stationPressure
          is_not_in: 3
        function absolute threshold:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure1
        action:
          name: reject
      - filter: Variable Assignment
        assignments:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure2
          type: float
          function:
            name: ObsFunction/ObsErrorBoundConventional
            options:
              obsvar: stationPressure
              obserr_bound_min: 100
              obserr_bound_max: 300
              obserr_bound_factor: 3.5
      - filter: Background Check
        filter variables:
        - name: stationPressure
        where:
        - variable: PreQC/stationPressure
          is_in: 3
        function absolute threshold:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure2
        action:
          name: reject
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        action:
          name: inflate error
          inflation variable:
            name: ObsErrorFactorDuplicateCheck/stationPressure
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: PreUseFlag/stationPressure
          is_not_in: 0, 1
        action:
          name: reject
    - obs space:
        name: gnssro_cosmic2
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs/obs.20240224.t00z.gnssro_cosmic2.nc
            missing file action: warn
          obsgrouping:
            group variables:
            - sequenceNumber
            sort variable: impactHeightRO
            sort order: ascending
        obsdataout:
          engine:
            type: H5File
            obsfile: ./output/diag.gnssro_cosmic2_2024022400.nc
        simulated variables:
        - bendingAngle
      obs operator:
        name: GnssroBndNBAM
        obs options:
          use_compress: 1
          sr_steps: 2
          vertlayer: full
          super_ref_qc: NBAM
          output_diags: true
      obs filters:
      - filter: Create Diagnostic Flags
        filter variables:
        - name: bendingAngle
        flags:
        - name: pccfCheckReject
          initial value: false
          force reinitialization: true
      - filter: Bounds Check
        filter variables:
        - name: bendingAngle
        where:
        - variable:
            name: MetaData/satelliteIdentifier
          is_in: 265-269,750-755,44,786,820,825
        test variables:
        - name: MetaData/pccf
        minvalue: 0.1
        maxvalue: 100.1
        actions:
        - name: set
          flag: pccfCheckReject
        - name: reject
      - filter: Domain Check
        filter variables:
        - name: bendingAngle
        where:
        - variable:
            name: MetaData/impactHeightRO
          minvalue: 0
          maxvalue: 55000.1
        action:
          name: reject
      - filter: Background Check RONBAM
        filter variables:
        - name: bendingAngle
        action:
          name: reject
        defer to post: true
      - filter: ROobserror
        filter variables:
        - name: bendingAngle
        errmodel: NBAM
        defer to post: true
      - filter: Perform Action
        filter variables:
        - name: bendingAngle
        action:
          name: RONBAMErrInflate
        defer to post: true
    - obs space:
        name: ascatw_ascat_metop-b
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs/obs.20240224.t00z.scatwnd.ascat_metop-b.nc
            missing file action: warn
        obsdataout:
          engine:
            type: H5File
            obsfile: ./output/diag.scatwnd.ascat_metop-b_2024022400.nc
        io pool:
          max pool size: 1
        simulated variables:
        - windEastward
        - windNorthward
      obs operator:
        name: VertInterp
        vertical coordinate: geopotential_height
        observation vertical coordinate group: DerivedVariables
        observation vertical coordinate: adjustedHeight
        interpolation method: linear
        hofx scaling field: SurfaceWindScalingHeight
        hofx scaling field group: DerivedVariables
      linear obs operator:
        name: VertInterp
        vertical coordinate: geopotential_height
        observation vertical coordinate group: DerivedVariables
        observation vertical coordinate: adjustedHeight
        interpolation method: linear
      obs pre filters:
      - filter: Gaussian Thinning
        horizontal_mesh: 75
        use_reduced_horizontal_grid: true
        round_horizontal_bin_count_to_nearest: true
        partition_longitude_bins_using_mesh: true
        action:
          name: reduce obs space
      obs prior filters:
      - filter: Variable Transforms
        Transform: AdjustedHeightCoordinate
        SkipWhenNoObs: false
      - filter: Variable Transforms
        Transform: SurfaceWindScalingHeight
        SkipWhenNoObs: false
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        action:
          name: assign error
          error parameter: 1.5
      obs post filters:
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        where:
        - variable: ObsType/windEastward
          is_in: 290
        - variable: GeoVaLs/skin_temperature_at_surface_where_land
          maxvalue: 273.0
        action:
          name: reject
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        where:
        - variable: ObsType/windEastward
          is_in: 290
        - variable: GeoVaLs/water_area_fraction
          maxvalue: 0.99
        action:
          name: reject
      - filter: Bounds Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        test variables:
        - name: ObsFunction/Arithmetic
          options:
            variables:
            - name: ObsValue/windEastward
            - name: HofX/windEastward
            coefs:
            - 1.0
            - -1.0
        minvalue: -5.0
        maxvalue: 5.0
      - filter: Bounds Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        test variables:
        - name: ObsFunction/Arithmetic
          options:
            variables:
            - name: ObsValue/windNorthward
            - name: HofX/windNorthward
            coefs:
            - 1.0
            - -1.0
        minvalue: -5.0
        maxvalue: 5.0
      - filter: Background Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        threshold: 6.0
        absolute threshold: 6.0
        where:
        - variable: ObsType/windEastward
          is_in: 291
        action:
          name: reject
      - filter: Bounds Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        where:
        - variable: ObsType/windEastward
          is_in: 290
        test variables:
