          - graupel
          - ozone_mass_mixing_ratio
      weight:
        value: 0.875
  observations:
    obs perturbations: false
    observers:
    - obs space:
        name: conventional_ps
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs/obs.20240224.t00z.conventional_ps.nc
            missing file action: warn
        obsdataout:
          engine:
            type: H5File
            obsfile: ./output/diag.conventional_ps_2024022400.nc
        io pool:
          max pool size: 1
        simulated variables:
        - stationPressure
      obs operator:
        name: SfcCorrected
        variables:
        - name: stationPressure
        correction scheme to use: GSL
        station_altitude: height
        geovar_sfc_geomz: height_above_mean_sea_level_at_surface
        geovar_geomz: geopotential_height
      linear obs operator:
        name: Identity
        variables:
        - name: stationPressure
      obs prior filters:
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 181
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 80000
              - 75000
              - 70000
              - 65000
              - 60000
              - 55000
              errors:
              - 110
              - 120
              - 120
              - 120
              - 120
              - 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 187
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
