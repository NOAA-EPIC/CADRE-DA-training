    - obs space:
        name: conventional_ps
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs/obs.20240224.t00z.conventional_ps.nc
            missing file action: warn
        obsdataout:
          engine:
            type: H5File
            obsfile: ./output/diag.conventional_ps_2024022400.nc
        io pool:
          max pool size: 1
        simulated variables:
        - stationPressure
      obs operator:
        name: SfcCorrected
        variables:
        - name: stationPressure
        correction scheme to use: GSL
        station_altitude: height
        geovar_sfc_geomz: height_above_mean_sea_level_at_surface
        geovar_geomz: geopotential_height
      linear obs operator:
        name: Identity
        variables:
        - name: stationPressure
      obs prior filters:
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 181
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 80000
              - 75000
              - 70000
              - 65000
              - 60000
              - 55000
              errors:
              - 110
              - 120
              - 120
              - 120
              - 120
              - 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 187
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 85000
              - 80000
              - 75000
              - 70000
              - 65000
              - 60000
              - 55000
              errors:
              - 120
              - 140
              - 140
              - 140
              - 140
              - 140
              - 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 180
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 60000
              - 55000
              errors:
              - 130
              - 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 183
        action:
          name: assign error
          error parameter: 100000000000.0
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: ObsType/stationPressure
          is_in:
          - 120
        action:
          name: assign error
          error function:
            name: ObsFunction/ObsErrorModelStepwiseLinear
            options:
              round_to_the_nearest_integer: true
              xvar:
                name: ObsValue/stationPressure
              xvals:
              - 80000
              - 75000
              - 70000
              - 65000
              - 60000
              - 55000
              errors:
              - 110
              - 120
              - 120
              - 120
              - 120
              - 100000000000.0
      - filter: Variable Assignment
        assignments:
        - name: InputObsError/stationPressure
          type: float
          source variable: ObsErrorData/stationPressure
      - filter: Variable Assignment
        assignments:
        - name: PreQC/stationPressure
          type: int
          source variable: QualityMarker/stationPressure
      - filter: Variable Assignment
        assignments:
        - name: PreUseFlag/stationPressure
          type: int
          source variable: PreQC/stationPressure
      - filter: Variable Assignment
        where:
        - variable:
            name: PreUseFlag/stationPressure
          is_in: 1-15
        assignments:
        - name: PreUseFlag/stationPressure
          value: 0
      - filter: Variable Assignment
        where:
        - variable:
            name: ObsType/stationPressure
          is_in: 183
        assignments:
        - name: PreUseFlag/stationPressure
          value: 100
      - filter: Variable Assignment
        where:
        - variable:
            name: ObsValue/stationPressure
          is_defined: null
        - variable:
            name: ObsValue/stationPressure
          maxvalue: 50000.0
        where operator: and
        assignments:
        - name: PreUseFlag/stationPressure
          value: 100
      - filter: Variable Assignment
        where:
        - variable:
            name: PreQC/stationPressure
          is_in: 9, 12, 15
        assignments:
        - name: PreUseFlag/stationPressure
          value: 100
      - filter: Variable Assignment
        where:
        - variable:
            name: PreQC/stationPressure
          is_in: 4-15
        assignments:
        - name: PreUseFlag/stationPressure
          value: 101
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: PreQC/stationPressure
          is_in: 3, 7
        action:
          name: inflate error
          inflation factor: 1.2
      obs post filters:
      - filter: Variable Assignment
        assignments:
        - name: ObsErrorFactorDuplicateCheck/stationPressure
          type: float
          function:
            name: ObsFunction/ObsErrorFactorDuplicateCheck
            options:
              use_air_pressure: false
              variable: stationPressure
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable:
            name: ObsType/stationPressure
          is_in: 180
        - variable:
            name: ObsSubType/stationPressure
          is_in: 0
        action:
          name: inflate error
          inflation factor: 0.7
      - filter: Variable Assignment
        assignments:
        - name: ObsErrorFactorSfcPressure/stationPressure
          type: float
          function:
            name: ObsFunction/ObsErrorFactorSfcPressure
            options:
              geovar_sfc_geomz: height_above_mean_sea_level_at_surface
              geovar_geomz: geopotential_height
              station_altitude: height
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        action:
          name: inflate error
          inflation variable:
            name: ObsErrorFactorSfcPressure/stationPressure
      - filter: Variable Assignment
        assignments:
        - name: DerivedMetaData/Innovation
          type: float
          function:
            name: ObsFunction/Arithmetic
            options:
              variables:
              - name: ObsValue/stationPressure
              - name: HofX/stationPressure
              coefs:
              - 1
              - -1
      - filter: Variable Assignment
        assignments:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure1
          type: float
          function:
            name: ObsFunction/ObsErrorBoundConventional
            options:
              obsvar: stationPressure
              obserr_bound_min: 100
              obserr_bound_max: 300
              obserr_bound_factor: 5.0
      - filter: Background Check
        filter variables:
        - name: stationPressure
        where:
        - variable: PreQC/stationPressure
          is_not_in: 3
        function absolute threshold:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure1
        action:
          name: reject
      - filter: Variable Assignment
        assignments:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure2
          type: float
          function:
            name: ObsFunction/ObsErrorBoundConventional
            options:
              obsvar: stationPressure
              obserr_bound_min: 100
              obserr_bound_max: 300
              obserr_bound_factor: 3.5
      - filter: Background Check
        filter variables:
        - name: stationPressure
        where:
        - variable: PreQC/stationPressure
          is_in: 3
        function absolute threshold:
        - name: DerivedMetaData/ObsErrorBoundSfcPressure2
        action:
          name: reject
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        action:
          name: inflate error
          inflation variable:
            name: ObsErrorFactorDuplicateCheck/stationPressure
      - filter: Perform Action
        filter variables:
        - name: stationPressure
        where:
        - variable: PreUseFlag/stationPressure
          is_not_in: 0, 1
        action:
          name: reject
