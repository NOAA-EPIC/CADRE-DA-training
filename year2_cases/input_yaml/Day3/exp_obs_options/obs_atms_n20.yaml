        Absorbers:
        - H2O
        - O3
        - CO2
        Clouds: &id001
        - Water
        - Ice
        - Rain
        - Snow
        - Graupel
        method for cloud fraction within fov: thompson
        method for hydrometeor effective radii within fov: thompson
        Cloud_Seeding: true
        obs options:
          Sensor_ID: atms_n20
          EndianType: little_endian
          CoefficientPath: ./crtm/
        do fov average: true
        fov sample points per semimajor axis: 4
        linear obs operator:
          Absorbers:
          - H2O
          - O3
      obs bias:
        input file: ./obs/obs.20240223.t18z.atms_n20.satbias.nc
        output file: ./output/obs.20240224.t00z.atms_n20.satbias.nc
        variables without bc:
        - brightnessTemperature
        channels: 15
        variational bc:
          predictors:
          - name: constant
          - name: lapseRate
            order: 2
            tlapse: ./obs/obs.20240223.t18z.atms_n20.tlapse.txt
          - name: lapseRate
            tlapse: ./obs/obs.20240223.t18z.atms_n20.tlapse.txt
          - name: emissivityJacobian
          - name: sensorScanAngle
            order: 4
          - name: sensorScanAngle
            order: 3
          - name: sensorScanAngle
            order: 2
          - name: sensorScanAngle
        covariance:
          minimal required obs number: 20
          variance range:
          - 1.0e-06
          - 10.0
          step size: 0.0001
          largest analysis variance: 10000.0
          prior:
            input file: ./obs/obs.20240223.t18z.atms_n20.satbias_cov.nc
            inflation:
              ratio: 1.1
              ratio for small dataset: 2.0
          output file: ./output/obs.20240224.t00z.atms_n20.satbias_cov.nc
      obs pre filters:
      - filter: Domain Check
        filter variables:
        - name: brightnessTemperature
          channels: 1-22
        where:
        - variable:
            name: MetaData/sensorScanPosition
          is_in: 7-90
        action:
          name: reduce obs space
      - filter: Gaussian Thinning
        horizontal_mesh: 145
        use_reduced_horizontal_grid: true
        distance_norm: geodesic
        round_horizontal_bin_count_to_nearest: true
