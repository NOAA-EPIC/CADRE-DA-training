members:
- background input:
    datapath: ./bkg
    filetype: cube sphere history
    provider: ufs
    datetime: '2024-02-24T00:00:00Z'
    filenames:
    - ufsda.t18z.atm.f006.cubed_sphere_grid.nc
    - ufsda.t18z.sfc.f006.cubed_sphere_grid.nc
    max allowable geometry difference: 1e-4
    state variables:
    - eastward_wind
    - northward_wind
    - air_temperature
    - air_pressure_at_surface
    - water_vapor_mixing_ratio_wrt_moist_air
    - cloud_liquid_ice
    - cloud_liquid_water
    - ozone_mass_mixing_ratio
    - snow_water
    - rain_water
    - graupel
    - geopotential_height_at_surface
    field io names:
      eastward_wind: ugrd
      northward_wind: vgrd
      air_temperature: tmp
      layer_thickness: delz
      air_pressure_thickness: dpres
      air_pressure_at_surface: pressfc
      water_vapor_mixing_ratio_wrt_moist_air: spfh
      cloud_liquid_ice: icmr
      cloud_liquid_water: clwmr
      snow_water: snmr
      rain_water: rwmr
      graupel: grle
      ozone_mass_mixing_ratio: o3mr
      geopotential_height_at_surface: hgtsfc
  jedi increment input:
    filetype: cube sphere history
    provider: ufs
    field io names:
      eastward_wind: ugrd
      northward_wind: vgrd
      air_temperature: tmp
      layer_thickness: delz
      air_pressure_thickness: dpres
      air_pressure_at_surface: pressfc
      water_vapor_mixing_ratio_wrt_moist_air: spfh
      cloud_liquid_ice: icmr
      cloud_liquid_water: clwmr
      snow_water: snmr
      rain_water: rwmr
      graupel: grle
      ozone_mass_mixing_ratio: o3mr
      geopotential_height_at_surface: hgtsfc
    datapath: ./output
    filename: cubed_sphere_grid_atminc.jedi.nc
  fv3 increment output:
    filetype: fms restart
    is restart: false
    datapath: ./output
    filename_nonrestart: ufsda.t00z.atminc.cubed_sphere_grid.nc
    field io names:
      eastward_wind: u_inc
      northward_wind: v_inc
      air_temperature: T_inc
      water_vapor_mixing_ratio_wrt_moist_air: sphum_inc
      cloud_liquid_water: liq_wat_inc
      ozone_mass_mixing_ratio: o3mr_inc
      cloud_liquid_ice: icmr_inc
      snow_water: snmr_inc
      rain_water: rwmr_inc
      graupel: grle_inc
      air_pressure_thickness: delp_inc
      layer_thickness: delz_inc
