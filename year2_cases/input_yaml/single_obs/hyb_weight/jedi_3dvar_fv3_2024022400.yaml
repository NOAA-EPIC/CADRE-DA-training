          - O3
      obs bias:
        input file: ./obs/obs.20240223.t18z.atms_n20.satbias.nc
        output file: ./output/obs.20240224.t00z.atms_n20.satbias.nc
        variables without bc:
        - brightnessTemperature
        channels: 15
