background:
  atm_file: ../bkg/ufsda.t18z.atm.f006.cubed_sphere_grid.nc
  vars:
    - ugrd
    - vgrd
    - tmp
    - spfh

increments:
  prefix: ../output/ufsda.t00z.atminc.cubed_sphere_grid.tile
  grid_prefix: ../grid/C96_grid.tile
  vars:
    - u_inc
    - v_inc
    - T_inc
    - sphum_inc

mapping:
  - bkg: ugrd
    inc: u_inc
    long_name: "Zonal wind"

  - bkg: vgrd
    inc: v_inc
    long_name: "Meridional wind"

  - bkg: tmp
    inc: T_inc
    long_name: "Temperature"

  - bkg: spfh
    inc: sphum_inc
    long_name: "Specific humidity"

spectra:
  levels:
    - 126
    - 75
  output_dir: ./spectra_bkg_inc
