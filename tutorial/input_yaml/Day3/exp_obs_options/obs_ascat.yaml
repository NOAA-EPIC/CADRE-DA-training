    - obs space:
        name: ascatw_ascat_metop-b
        obsdatain:
          engine:
            type: H5File
            obsfile: ./obs/obs.20240224.t00z.scatwnd.ascat_metop-b.nc
            missing file action: warn
        obsdataout:
          engine:
            type: H5File
            obsfile: ./output/diag.scatwnd.ascat_metop-b_2024022400.nc
        io pool:
          max pool size: 1
        simulated variables:
        - windEastward
        - windNorthward
      obs operator:
        name: VertInterp
        vertical coordinate: geopotential_height
        observation vertical coordinate group: DerivedVariables
        observation vertical coordinate: adjustedHeight
        interpolation method: linear
        hofx scaling field: SurfaceWindScalingHeight
        hofx scaling field group: DerivedVariables
      linear obs operator:
        name: VertInterp
        vertical coordinate: geopotential_height
        observation vertical coordinate group: DerivedVariables
        observation vertical coordinate: adjustedHeight
        interpolation method: linear
      obs pre filters:
      - filter: Gaussian Thinning
        horizontal_mesh: 75
        use_reduced_horizontal_grid: true
        round_horizontal_bin_count_to_nearest: true
        partition_longitude_bins_using_mesh: true
        action:
          name: reduce obs space
      obs prior filters:
      - filter: Variable Transforms
        Transform: AdjustedHeightCoordinate
        SkipWhenNoObs: false
      - filter: Variable Transforms
        Transform: SurfaceWindScalingHeight
        SkipWhenNoObs: false
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        action:
          name: assign error
          error parameter: 1.5
      obs post filters:
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        where:
        - variable: ObsType/windEastward
          is_in: 290
        - variable: GeoVaLs/skin_temperature_at_surface_where_land
          maxvalue: 273.0
        action:
          name: reject
      - filter: Perform Action
        filter variables:
        - name: windEastward
        - name: windNorthward
        where:
        - variable: ObsType/windEastward
          is_in: 290
        - variable: GeoVaLs/water_area_fraction
          maxvalue: 0.99
        action:
          name: reject
      - filter: Bounds Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        test variables:
        - name: ObsFunction/Arithmetic
          options:
            variables:
            - name: ObsValue/windEastward
            - name: HofX/windEastward
            coefs:
            - 1.0
            - -1.0
        minvalue: -5.0
        maxvalue: 5.0
      - filter: Bounds Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        test variables:
        - name: ObsFunction/Arithmetic
          options:
            variables:
            - name: ObsValue/windNorthward
            - name: HofX/windNorthward
            coefs:
            - 1.0
            - -1.0
        minvalue: -5.0
        maxvalue: 5.0
      - filter: Background Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        threshold: 6.0
        absolute threshold: 6.0
        where:
        - variable: ObsType/windEastward
          is_in: 291
        action:
          name: reject
      - filter: Bounds Check
        filter variables:
        - name: windEastward
        - name: windNorthward
        where:
        - variable: ObsType/windEastward
          is_in: 290
        test variables:
        - name: ObsFunction/ScatWindsAmbiguityCheck
          options:
            minimum_uv: 0.0001
        maxvalue: 0.0
        action:
          name: reject
      - filter: Perform Action
        filter variables:
        - name: windEastward
        where:
        - variable:
            name: ObsType/windEastward
          is_in: 290-291
        action:
          name: inflate error
          inflation variable:
            name: ObsFunction/ObsErrorFactorPressureCheck
            options:
              variable: windEastward
              inflation factor: 4.0
      - filter: Perform Action
        filter variables:
        - name: windNorthward
        where:
        - variable:
            name: ObsType/windNorthward
          is_in: 290-291
        action:
          name: inflate error
          inflation variable:
            name: ObsFunction/ObsErrorFactorPressureCheck
            options:
              variable: windNorthward
              inflation factor: 4.0
      - filter: Background Check
        filter variables:
        - name: windEastward
        function absolute threshold:
        - name: ObsFunction/WindsSPDBCheck
          options:
            wndtype:
            - 290
            - 291
            cgross:
            - 5.0
            - 5.0
            error_min:
            - 1.4
            - 1.4
            error_max:
            - 6.1
            - 6.1
            variable: windEastward
        action:
          name: reject
      - filter: Background Check
        filter variables:
        - name: windNorthward
        function absolute threshold:
        - name: ObsFunction/WindsSPDBCheck
          options:
            wndtype:
            - 290
            - 291
            cgross:
            - 5.0
            - 5.0
            error_min:
            - 1.4
            - 1.4
            error_max:
            - 6.1
            - 6.1
            variable: windNorthward
        action:
          name: reject
